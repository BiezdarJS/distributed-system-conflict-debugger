@let pendingOperationItemData = pendingOperationItem();

@if (pendingOperationItemData) {
  <div class="pending-operation">
    <div class="pending-operation__identity operation-identity">
      <span
        class="operation-identity__badge inline-flex gap-2 bg-blue-500 text-sm font-medium px-2 py-1 rounded"
        [ngClass]="{
          'bg-blue-500': pendingOperationItemData.source === clientTypeEnum.ClientA,
          'bg-green-800': pendingOperationItemData.source === clientTypeEnum.ClientB,
        }"
      >
        {{ pendingOperationItemData.source | clientBadge }}
      </span>
      <div class="operation-identity__content text-xs">
        {{ clientTypeLabels[pendingOperationItemData.source] }}
        zmienił tytuł na
        {{ pendingOperationItemData.payload.value }}
      </div>
    </div>
    <div class="pending-operation__scheduling">
      <div class="operation-scheduling__title"></div>
      <div class="operation-scheduling__dispatch">
        <label
          class="scheduling-displatch__label"
          for="dispatch-slider"
        >
          Dispatch Offset
        </label>
        <input
          id="dispatch-slider"
          class="scheduling-displatch__slider"
          type="range"
          min="1"
          max="100"
          value="50"
        />
      </div>
    </div>
    <div class="pending-operation__controls">
      <ds-icons
        [basic]="'arrow-up'"
        [size]="20"
      />
      <ds-icons
        [basic]="'arrow-down'"
        [size]="20"
      />
    </div>
  </div>
}
